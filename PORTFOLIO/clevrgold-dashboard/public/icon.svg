<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="50%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle radial glow center -->
  <circle cx="256" cy="240" r="200" fill="#eab308" opacity="0.03"/>

  <!-- Mini chart line (subtle, background) -->
  <polyline
    points="80,340 150,310 210,320 256,260 310,230 370,170 430,140"
    fill="none" stroke="url(#chartLine)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.5"
  />
  <circle cx="430" cy="140" r="4" fill="#22c55e" opacity="0.6"/>

  <!-- Bold CG Text -->
  <text
    x="256" y="310"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="220"
    fill="url(#gold)"
    letter-spacing="-12"
    filter="url(#goldGlow)"
  >CG</text>

  <!-- Gold underline accent -->
  <rect x="130" y="340" width="252" height="4" rx="2" fill="url(#gold)" opacity="0.6"/>

  <!-- Subtle tagline -->
  <text
    x="256" y="378"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="36"
    fill="#94a3b8"
    letter-spacing="12"
    opacity="0.5"
  >GOLD</text>

  <!-- Thin border -->
  <rect x="3" y="3" width="506" height="506" rx="110" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.15"/>
</svg>
